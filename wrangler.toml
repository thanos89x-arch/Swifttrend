name            = "swifttrend-ai"
main            = "api/edge-proxy.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ── Static assets via Workers Assets ─────────────────────────────────
[assets]
directory = "./dist"
binding   = "ASSETS"

# ── Routes ────────────────────────────────────────────────────────────
[[routes]]
  pattern = "{{PRODUCTION_DOMAIN}}/api/*"
  zone_name = "{{PRODUCTION_DOMAIN}}"

[[routes]]
  pattern = "{{PRODUCTION_DOMAIN}}/*"
  zone_name = "{{PRODUCTION_DOMAIN}}"

# ── Runtime secrets (wrangler secret put <NAME>) ──────────────────────
# Run:  wrangler secret put ANTHROPIC_KEY
#       wrangler secret put FTMO_API_URL
#       wrangler secret put FTMO_API_KEY
#       wrangler secret put MARKET_DATA_KEY
#       wrangler secret put PRODUCTION_DOMAIN

# ── Non-secret env vars ───────────────────────────────────────────────
[vars]
VITE_API_BASE = "/api"

# ── Build ─────────────────────────────────────────────────────────────
[build]
  command = "npm run build"

# ── Per-environment overrides ─────────────────────────────────────────
[env.staging]
  name = "swifttrend-ai-staging"
  [env.staging.vars]
    VITE_DEMO_MODE = "true"
