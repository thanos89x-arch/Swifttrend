name: SwiftTrendAI CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check & Lint
        run: |
          npx tsc --noEmit
          npm run lint -- --max-warnings 0

      - name: Build
        env:
          VITE_API_BASE_URL: /api
          VITE_APP_ENV: production
          # ✅ CORRETTO: vars. per le Variables, secrets. per i Secrets
          PRODUCTION_DOMAIN: ${{ vars.PRODUCTION_DOMAIN }}
        run: npm run build

      - name: Deploy (Vercel)
        if: ${{ vars.DEPLOY_TARGET == 'vercel' }}
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: .
          vercel-args: '--prod'
          # ✅ Passa il dominio come env al deploy se necessario
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy (Netlify)
        if: ${{ vars.DEPLOY_TARGET == 'netlify' }}
        run: npx netlify-cli deploy --prod --dir=dist --auth=${{ secrets.NETLIFY_AUTH_TOKEN }} --site=${{ secrets.NETLIFY_SITE_ID }}

      - name: Deploy (Cloudflare Pages)
        if: ${{ vars.DEPLOY_TARGET == 'cloudflare' }}
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: swifttrendai-dashboard
          directory: dist
          # ✅ Variabile dominio per eventuali script post-deploy
          environment: production
