[build]
  command       = "npm run build"
  publish       = "dist"
  ignore        = "git diff --quiet HEAD^ HEAD -- src/ public/ index.html vite.config.js"

[build.environment]
  NODE_VERSION  = "20"
  NPM_FLAGS     = "--legacy-peer-deps=false"

# ── SPA fallback ──────────────────────────────────────────────────────
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/edge-functions/edge-proxy/:splat"
  status = 200

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Cache: HTML shell (must-revalidate) ───────────────────────────────
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control             = "no-cache, no-store, must-revalidate"
    X-Content-Type-Options    = "nosniff"
    X-Frame-Options           = "DENY"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy   = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' /api/ https://api.binance.com https://api.alternative.me https://api.twelvedata.com; font-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# ── Cache: hashed assets (immutable) ─────────────────────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Edge function config ──────────────────────────────────────────────
[[edge_functions]]
  path     = "/api/*"
  function = "edge-proxy"

[functions]
  directory = "netlify/functions"

# ── Dev server ────────────────────────────────────────────────────────
[dev]
  command     = "npm run dev"
  port        = 5173
  targetPort  = 5173
  publish     = "dist"
  autoLaunch  = false
