name: SwiftTrendAI CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check & Lint
        run: |
          node node_modules/typescript/bin/tsc --noEmit -p src/tsconfig.json
          npm run lint -- --max-warnings 0

      - name: Build
        env:
          VITE_API_BASE_URL: /api
          VITE_APP_ENV: production
          PRODUCTION_DOMAIN: ${{ vars.PRODUCTION_DOMAIN }}
        run: npm run build

      # ── Deploy: Vercel (via official CLI) ────────────────────────────
      - name: Deploy (Vercel)
        if: ${{ vars.DEPLOY_TARGET == 'vercel' }}
        env:
          VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm install --global vercel@latest
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

      # ── Deploy: Netlify ───────────────────────────────────────────────
      - name: Deploy (Netlify)
        if: ${{ vars.DEPLOY_TARGET == 'netlify' }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID:    ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          npm install --global netlify-cli@latest
          netlify deploy --prod --dir=dist

      # ── Deploy: Cloudflare Pages ──────────────────────────────────────
      - name: Deploy (Cloudflare Pages)
        if: ${{ vars.DEPLOY_TARGET == 'cloudflare' }}
        uses: cloudflare/pages-action@v1
        with:
          apiToken:    ${{ secrets.CF_API_TOKEN }}
          accountId:   ${{ secrets.CF_ACCOUNT_ID }}
          projectName: swifttrendai-dashboard
          directory:   dist
          environment: production
