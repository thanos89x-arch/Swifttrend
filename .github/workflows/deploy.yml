name: CI · Type-check · Build · Deploy

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # ── 1. CI: type-check + build ───────────────────────────────────────
  ci:
    name: Type-check & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript — strict type-check
        run: node node_modules/typescript/bin/tsc --noEmit -p src/tsconfig.json

      - name: Vite — production build
        run: npm run build
        env:
          VITE_API_BASE: /api
          VITE_DEMO_MODE: "false"

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 1

  # ── 2. Deploy — Vercel ─────────────────────────────────────────────
  deploy-vercel:
    name: Deploy → Vercel
    needs: ci
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' &&
      vars.DEPLOY_TARGET == 'vercel'
    environment:
      name: production
      url: https://${{ secrets.PRODUCTION_DOMAIN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build via Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          ANTHROPIC_KEY:     ${{ secrets.ANTHROPIC_KEY }}
          FTMO_API_URL:      ${{ secrets.FTMO_API_URL }}
          FTMO_API_KEY:      ${{ secrets.FTMO_API_KEY }}
          MARKET_DATA_KEY:   ${{ secrets.MARKET_DATA_KEY }}
          PRODUCTION_DOMAIN: ${{ secrets.PRODUCTION_DOMAIN }}

  # ── 3. Deploy — Netlify ────────────────────────────────────────────
  deploy-netlify:
    name: Deploy → Netlify
    needs: ci
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' &&
      vars.DEPLOY_TARGET == 'netlify'
    environment:
      name: production
      url: https://${{ secrets.PRODUCTION_DOMAIN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Production build
        run: npm run build
        env:
          VITE_API_BASE: /api

      - name: Deploy to Netlify
        uses: netlify/actions/cli@master
        with:
          args: deploy --dir=dist --prod --message="sha=${{ github.sha }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID:    ${{ secrets.NETLIFY_SITE_ID }}

  # ── 4. Deploy — Cloudflare Workers ────────────────────────────────
  deploy-cloudflare:
    name: Deploy → Cloudflare
    needs: ci
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' &&
      vars.DEPLOY_TARGET == 'cloudflare'
    environment:
      name: production
      url: https://${{ secrets.PRODUCTION_DOMAIN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Production build
        run: npm run build
        env:
          VITE_API_BASE: /api

      - name: Deploy via Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken:  ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command:   deploy --env production
        env:
          ANTHROPIC_KEY:     ${{ secrets.ANTHROPIC_KEY }}
          FTMO_API_URL:      ${{ secrets.FTMO_API_URL }}
          FTMO_API_KEY:      ${{ secrets.FTMO_API_KEY }}
          MARKET_DATA_KEY:   ${{ secrets.MARKET_DATA_KEY }}
          PRODUCTION_DOMAIN: ${{ secrets.PRODUCTION_DOMAIN }}
